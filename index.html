<style>
:root {
  --bg-body: #0a0a0f;
  --bg-card: #12121a;
  --bg-elevated: #1a1a2e;
  --bg-input: #1a1a2e;
  --bg-header: rgba(10, 10, 15, 0.92);
  --bg-nav: rgba(10, 10, 15, 0.88);
  --bg-modal: #12121a;
  --bg-overlay: rgba(0, 0, 0, 0.75);
  --bg-pill: transparent;
  --bg-pill-active: linear-gradient(135deg, #6366f1, #8b5cf6);
  --bg-code: #1e1e2e;
  --bg-result: rgba(26, 26, 46, 0.6);
  --text-primary: #e2e8f0;
  --text-secondary: #94a3b8;
  --text-tertiary: #6b6b8a;
  --text-dim: #64748b;
  --border-subtle: rgba(255,255,255,0.06);
  --border-default: #252540;
  --border-input: #2a2a40;
  --border-hover: rgba(255,255,255,0.1);
  --accent: #6366f1;
  --accent-light: #a5b4fc;
  --accent-dim: rgba(99,102,241,0.1);
  --accent-glow: rgba(99,102,241,0.15);
  --shadow-card: 0 12px 40px rgba(0,0,0,0.4);
  --shadow-modal: 0 24px 80px rgba(0,0,0,0.5);
  --scrollbar-thumb: #333;
  --scrollbar-hover: #555;
  --toast-bg: #1a1a2e;
  --toast-border: rgba(99,102,241,0.3);
}
[data-theme="light"] {
  --bg-body: #f5f5f7;
  --bg-card: #ffffff;
  --bg-elevated: #f0f0f5;
  --bg-input: #f0f0f5;
  --bg-header: rgba(245, 245, 247, 0.92);
  --bg-nav: rgba(245, 245, 247, 0.88);
  --bg-modal: #ffffff;
  --bg-overlay: rgba(0, 0, 0, 0.4);
  --bg-pill: transparent;
  --bg-pill-active: linear-gradient(135deg, #6366f1, #8b5cf6);
  --bg-code: #f0f0f5;
  --bg-result: rgba(240, 240, 245, 0.8);
  --text-primary: #1a1a2e;
  --text-secondary: #4a5568;
  --text-tertiary: #718096;
  --text-dim: #a0aec0;
  --border-subtle: rgba(0,0,0,0.06);
  --border-default: #e2e8f0;
  --border-input: #d1d5db;
  --border-hover: rgba(0,0,0,0.12);
  --accent: #6366f1;
  --accent-light: #4f46e5;
  --accent-dim: rgba(99,102,241,0.08);
  --accent-glow: rgba(99,102,241,0.12);
  --shadow-card: 0 4px 20px rgba(0,0,0,0.08);
  --shadow-modal: 0 16px 48px rgba(0,0,0,0.12);
  --scrollbar-thumb: #c1c1c1;
  --scrollbar-hover: #999;
  --toast-bg: #ffffff;
  --toast-border: rgba(99,102,241,0.2);
}
[data-theme="light"] .feature-card::after {
  background: radial-gradient(600px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(99,102,241,0.04), transparent 40%);
}
[data-theme="light"] .card-desc { color: var(--text-secondary); }
[data-theme="light"] .card-num { color: var(--text-dim); }
[data-theme="light"] .f-label { color: var(--text-secondary) !important; }
[data-theme="light"] .f-divider { border-top-color: var(--border-default); }
[data-theme="light"] .logo {
  background: linear-gradient(135deg, #4f46e5 0%, #db2777 50%, #d97706 100%);
  -webkit-background-clip: text; background-clip: text;
}
[data-theme="light"] .logo-sub {
  color: var(--text-secondary);
  background: rgba(99,102,241,0.08);
  border-color: rgba(99,102,241,0.15);
}
[data-theme="light"] .f-badge {
  background: rgba(99,102,241,0.1);
  color: #4f46e5;
}
[data-theme="light"] .f-btn-outline {
  border-color: rgba(99,102,241,0.3);
  color: #4f46e5;
}
[data-theme="light"] .f-tab.active {
  background: rgba(99,102,241,0.12);
  color: #4f46e5;
  border-color: rgba(99,102,241,0.25);
}
[data-theme="light"] .no-results { color: var(--text-tertiary); }
[data-theme="light"] footer { border-top-color: rgba(0,0,0,0.06); color: var(--text-tertiary); }

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { height: 100%; -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
:focus-visible {
  outline: 2px solid #6366f1;
  outline-offset: 2px;
  border-radius: 4px;
}
.skip-nav {
  position: absolute; top: -100%; left: 16px;
  background: #6366f1; color: white;
  padding: 8px 16px; border-radius: 0 0 8px 8px;
  z-index: 999; font-size: 13px; font-weight: 600;
  text-decoration: none; transition: top 0.2s;
}
.skip-nav:focus { top: 0; }
::selection { background: rgba(99, 102, 241, 0.3); color: #e2e8f0; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg-body); color: var(--text-primary);
  min-height: 100vh; overflow-x: hidden; line-height: 1.5;
  transition: background 0.3s ease, color 0.3s ease;
}
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-hover); }

.lab-header {
  position: fixed; top: 0; left: 0; right: 0; height: 64px;
  background: var(--bg-header); backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border-subtle);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px; z-index: 100;
}
.logo {
  font-size: 22px; font-weight: 800;
  background: linear-gradient(135deg, #6366f1 0%, #ec4899 50%, #f59e0b 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; letter-spacing: -0.5px;
}
.logo-sub {
  font-size: 11px; color: #64748b; margin-left: 10px; font-weight: 500;
  background: rgba(99,102,241,0.1); padding: 3px 10px;
  border-radius: 20px; border: 1px solid rgba(99,102,241,0.2);
}
.header-left { display: flex; align-items: center; }
.search-box { position: relative; width: 280px; }
.search-box input {
  width: 100%; background: var(--bg-input);
  border: 1px solid var(--border-default); border-radius: 12px;
  padding: 10px 16px 10px 38px; color: var(--text-primary);
  font-size: 13px; outline: none; transition: all 0.3s; font-family: inherit;
}
.search-box input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.search-box input::placeholder { color: #6b6b8a; }
.search-icon {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: #6b6b8a; font-size: 14px; pointer-events: none;
}
.header-right { display: flex; align-items: center; gap: 16px; }
.feature-count { font-size: 12px; color: #64748b; font-weight: 500; }
.kbd-hint {
  font-size: 11px; color: var(--text-tertiary);
  background: var(--bg-elevated); padding: 2px 8px;
  border-radius: 4px; border: 1px solid var(--border-default); font-family: monospace;
}
.theme-toggle {
  width: 36px; height: 36px; border-radius: 10px;
  border: 1px solid var(--border-default); background: var(--bg-elevated);
  color: var(--text-primary); font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.3s ease; padding: 0; line-height: 1;
}
.theme-toggle:hover {
  background: var(--accent-dim); border-color: var(--accent); transform: rotate(20deg);
}
.category-nav {
  position: fixed; top: 64px; left: 0; right: 0;
  background: var(--bg-nav); backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border-subtle);
  padding: 12px 32px; display: flex; gap: 8px; z-index: 99; overflow-x: auto;
}
.category-nav::-webkit-scrollbar { height: 0; }
.cat-pill {
  padding: 8px 18px; border-radius: 24px; border: 1px solid var(--border-default);
  background: transparent; color: var(--text-secondary); font-size: 13px;
  font-weight: 500; cursor: pointer; white-space: nowrap;
  transition: all 0.25s ease; font-family: inherit;
}
.cat-pill:hover { border-color: rgba(99,102,241,0.4); color: var(--text-primary); background: var(--accent-dim); }
.cat-pill.active {
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  border-color: transparent; color: white; box-shadow: 0 2px 12px rgba(99,102,241,0.3);
}
.main-content {
  margin-top: 128px; padding: 24px 32px 80px;
  max-width: 1440px; margin-left: auto; margin-right: auto;
}
.feature-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 16px;
}
.feature-card {
  background: var(--bg-card); border: 1px solid var(--border-subtle);
  border-radius: 16px; padding: 24px; cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative; overflow: hidden;
}
.feature-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--card-color); opacity: 0; transition: opacity 0.3s;
}
.feature-card::after {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(600px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(99,102,241,0.06), transparent 40%);
  opacity: 0; transition: opacity 0.3s; pointer-events: none;
}
.feature-card:hover { border-color: var(--border-hover); transform: translateY(-4px); box-shadow: var(--shadow-card); }
.feature-card:hover::before { opacity: 1; }
.feature-card:hover::after { opacity: 1; }
.card-icon { font-size: 36px; margin-bottom: 14px; display: block; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3)); }
.card-num { position: absolute; top: 14px; right: 18px; font-size: 11px; color: #6b6b8a; font-weight: 600; font-variant-numeric: tabular-nums; }
.card-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; color: var(--text-primary); letter-spacing: -0.2px; }
.card-desc { font-size: 13px; color: #7a7a9a; line-height: 1.6; }
.card-cat {
  display: inline-flex; align-items: center; gap: 4px; margin-top: 14px;
  padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 500;
}
.modal-overlay {
  position: fixed; inset: 0; background: var(--bg-overlay);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  z-index: 200; display: none; align-items: center; justify-content: center; padding: 24px;
}
.modal-overlay.active { display: flex; }
.modal-container {
  background: var(--bg-modal); border: 1px solid var(--border-subtle);
  border-radius: 20px; width: 100%; max-width: 860px; max-height: 88vh;
  display: flex; flex-direction: column; overflow: hidden;
  animation: modalIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow: var(--shadow-modal);
}
@keyframes modalIn {
  from { opacity: 0; transform: scale(0.96) translateY(16px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 24px; border-bottom: 1px solid var(--border-subtle); flex-shrink: 0;
}
.modal-title { display: flex; align-items: center; gap: 12px; }
.modal-icon { font-size: 26px; }
.modal-title h2 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
.modal-close {
  width: 36px; height: 36px; border-radius: 10px;
  border: 1px solid var(--border-default); background: transparent;
  color: var(--text-secondary); font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.2s;
}
.modal-close:hover { background: var(--bg-elevated); color: var(--text-primary); border-color: var(--border-hover); }
.modal-body { padding: 24px; overflow-y: auto; flex: 1; }

.f-textarea {
  width: 100%; min-height: 120px; background: var(--bg-input);
  border: 1px solid var(--border-input); border-radius: 10px;
  color: var(--text-primary); padding: 14px; font-size: 14px;
  font-family: inherit; resize: vertical; outline: none;
  transition: border-color 0.3s; line-height: 1.6;
}
.f-textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.f-textarea::placeholder { color: var(--text-tertiary); }
.f-input {
  width: 100%; background: var(--bg-input);
  border: 1px solid var(--border-input); border-radius: 10px;
  color: var(--text-primary); padding: 11px 14px; font-size: 14px;
  font-family: inherit; outline: none; transition: border-color 0.3s;
}
.f-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.f-input::placeholder { color: var(--text-tertiary); }
.f-select {
  background: var(--bg-input); border: 1px solid var(--border-input);
  border-radius: 10px; color: var(--text-primary); padding: 11px 14px;
  font-size: 14px; outline: none; cursor: pointer; font-family: inherit;
  transition: border-color 0.3s;
}
.f-select:focus { border-color: var(--accent); }
.f-btn {
  background: linear-gradient(135deg, #6366f1, #8b5cf6); border: none;
  border-radius: 10px; color: white; padding: 11px 22px; font-size: 14px;
  font-weight: 600; cursor: pointer; transition: all 0.25s ease;
  font-family: inherit; letter-spacing: -0.1px;
}
.f-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(99, 102, 241, 0.4); }
.f-btn:active { transform: translateY(0); }
.f-btn-outline {
  background: transparent; border: 1px solid rgba(99,102,241,0.4);
  color: #a5b4fc; border-radius: 10px; padding: 11px 22px;
  font-size: 14px; font-weight: 500; cursor: pointer;
  transition: all 0.25s ease; font-family: inherit;
}
.f-btn-outline:hover { background: rgba(99, 102, 241, 0.1); border-color: #6366f1; }
.f-btn-sm { padding: 6px 14px; font-size: 12px; border-radius: 8px; }
.f-result {
  background: var(--bg-result); border-radius: 12px; padding: 18px;
  margin-top: 14px; min-height: 60px; border: 1px solid var(--border-default);
  line-height: 1.7; font-size: 14px;
}
.f-label { font-size: 13px; color: #7a7a9a; margin-bottom: 6px; display: block; font-weight: 500; }
.f-badge {
  display: inline-block; padding: 4px 12px; border-radius: 20px;
  font-size: 12px; font-weight: 500; background: rgba(99, 102, 241, 0.15); color: #a5b4fc;
}
.f-divider { border: none; border-top: 1px solid #252540; margin: 18px 0; }
.f-slider { width: 100%; accent-color: #6366f1; cursor: pointer; height: 6px; }
.f-tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
.f-tab {
  padding: 8px 16px; border-radius: 10px; background: var(--bg-input);
  color: var(--text-tertiary); border: 1px solid transparent; cursor: pointer;
  font-size: 13px; font-weight: 500; transition: all 0.2s; font-family: inherit;
}
.f-tab:hover { color: var(--text-primary); background: var(--bg-elevated); }
.f-tab.active { background: rgba(99,102,241,0.15); color: #a5b4fc; border-color: rgba(99,102,241,0.3); }
.f-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.f-col { display: flex; flex-direction: column; gap: 8px; }
.f-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.f-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.f-card-sm {
  background: var(--bg-elevated); border-radius: 10px; padding: 14px;
  border: 1px solid var(--border-default); transition: border-color 0.2s;
}
.f-card-sm:hover { border-color: var(--border-hover); }
.f-full { width: 100%; }
.no-results { text-align: center; padding: 80px 24px; color: #6b6b8a; grid-column: 1 / -1; }
.no-results .nr-emoji { font-size: 56px; margin-bottom: 16px; display: block; filter: grayscale(0.5); }
.no-results p { font-size: 15px; font-weight: 500; }
.toast {
  position: fixed; bottom: 28px; right: 28px;
  background: var(--toast-bg); border: 1px solid var(--toast-border);
  border-radius: 12px; padding: 12px 20px; color: var(--text-primary);
  font-size: 13px; font-weight: 500; z-index: 300;
  animation: toastIn 0.3s ease; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
@keyframes toastIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
@media (pointer: coarse) {
  .cat-pill { min-height: 44px; display: inline-flex; align-items: center; }
  .f-btn, .f-btn-outline { min-height: 44px; }
  .f-tab { min-height: 40px; }
  .modal-close { width: 44px; height: 44px; }
}
@media (max-width: 768px) {
  .lab-header { padding: 0 16px; height: 56px; }
  .search-box { width: 160px; }
  .logo { font-size: 18px; }
  .logo-sub { display: none; }
  .kbd-hint { display: none; }
  .category-nav { padding: 10px 16px; top: 56px; }
  .main-content { padding: 16px 16px 60px; margin-top: 110px; }
  .feature-grid { grid-template-columns: 1fr; gap: 12px; }
  .feature-card { padding: 20px; }
  .modal-container { max-width: 100%; max-height: 92vh; border-radius: 16px 16px 0 0; padding-bottom: env(safe-area-inset-bottom, 0); }
  .modal-overlay { padding: 0; align-items: flex-end; }
  .main-content { padding-bottom: calc(60px + env(safe-area-inset-bottom, 0)); }
  .f-grid-2, .f-grid-3 { grid-template-columns: 1fr; }
}
@media (max-width: 480px) {
  .search-box { width: 140px; }
  .cat-pill { padding: 6px 14px; font-size: 12px; }
}
</style>
</head>
<body>
<a href="#featureGrid" class="skip-nav">본문 바로가기</a>

<header class="lab-header">
  <div class="header-left">
    <span class="logo">🧪 AI Creative Lab</span>
    <span class="logo-sub">24 Tools</span>
  </div>
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="기능 검색..." oninput="handleSearch(this.value)" aria-label="기능 검색" autocomplete="off">
  </div>
  <div class="header-right">
    <span class="feature-count" id="featureCount">24개 기능</span>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" aria-label="테마 전환" title="라이트/다크 모드 전환">🌙</button>
    <span class="kbd-hint">/</span>
  </div>
</header>

<nav class="category-nav" id="categoryNav" aria-label="카테고리 필터">
  <button class="cat-pill active" data-cat="all" onclick="filterCategory('all', this)">🧪 전체 (24)</button>
  <button class="cat-pill" data-cat="productivity" onclick="filterCategory('productivity', this)">🧠 생산성 (4)</button>
  <button class="cat-pill" data-cat="finance" onclick="filterCategory('finance', this)">📊 금융/투자 (6)</button>
  <button class="cat-pill" data-cat="learning" onclick="filterCategory('learning', this)">📚 학습/리서치 (4)</button>
  <button class="cat-pill" data-cat="lifestyle" onclick="filterCategory('lifestyle', this)">🏠 라이프스타일 (6)</button>
  <button class="cat-pill" data-cat="utility" onclick="filterCategory('utility', this)">🔧 유틸리티 (4)</button>
</nav>

<main class="main-content">
  <div class="feature-grid" id="featureGrid"></div>

Lab.meetingSummary={run:function(el){var text=el.querySelector('.f-textarea').value.trim(),r=el.querySelector('.f-result');r.style.display='block';if(!text){r.innerHTML='<p style="color:#94a3b8">회의 내용을 입력해주세요.</p>';return}var sents=text.split(/(?<=[.!?。\n])\s*/).filter(function(s){return s.trim().length>5}),kw=['핵심','중요','결론','결과','따라서','주요','목표','전략','합의','결정','계획'],scored=sents.map(function(s){var sc=Math.min(s.length,80)*.1;kw.forEach(function(k){if(s.includes(k))sc+=10});return{t:s.trim(),s:sc}}).sort(function(a,b){return b.s-a.s}),sum=scored.slice(0,Math.min(5,scored.length)),akw=['해야','할 것','확인','검토','준비','제출','완료','TODO','다음주','내일','까지'],acts=sents.filter(function(s){return akw.some(function(k){return s.includes(k)})});

Lab.reportDraft={run:function(el){var type=el.querySelector('[data-t]').value,title=el.querySelector('.f-input').value.trim(),kws=el.querySelector('[data-k]').value,content=el.querySelector('.f-textarea').value.trim(),r=el.querySelector('.f-result');r.style.display='block';if(!title){r.innerHTML='<p style="color:#94a3b8">제목을 입력해주세요.</p>';return}var tn={'weekly':'주간','monthly':'월간','project':'프로젝트','analysis':'분석'},date=new Date().toLocaleDateString('ko-KR'),kw=kws?kws.split(',').map(function(k){return k.trim()}):[],body=content||'[주요 내용을 여기에 기술]';var h='<div style="font-size:14px;line-height:1.8"><h3 style="color:#a5b4fc;text-align:center;margin-bottom:4px">'+esc(title)+'</h3><p style="text-align:center;color:#64748b;font-size:12px">'+tn[type]+' 보고서 | '+date+' | 작성자: [이름]</p><hr class="f-divider"><h4 style="color:#6366f1">1. 개요</h4><p style="color:#e2e8f0">본 보고서는 '+kw.slice(0,3).map(function(k){return esc(k)}).join(', ')+' 관련 현황을 정리하고 향후 방향을 제시합니다.</p><h4 style="color:#6366f1;margin-top:14px">2. 현황</h4><p style="color:#e2e8f0">'+esc(body.split('\n')[0])+'</p><h4 style="color:#6366f1;margin-top:14px">3. 분석</h4><p style="color:#e2e8f0">'+esc(body.split('\n')[1]||'현재 데이터 기반으로 분석한 결과, 주요 트렌드는 다음과 같습니다.')+'</p><h4 style="color:#6366f1;margin-top:14px">4. 결론</h4><p style="color:#e2e8f0">종합적으로 '+esc(kw[0]||'핵심 지표')+' 기준 긍정적/부정적 추세가 관찰되며, 주의 깊은 모니터링이 필요합니다.</p><h4 style="color:#6366f1;margin-top:14px">5. 건의사항</h4><ul style="color:#e2e8f0;padding-left:20px"><li>'+kw.map(function(k){return esc(k)+' 관련 추가 검토 필요'}).join('</li><li>')+'</li></ul></div>';r.innerHTML=h+'<button class="f-btn-outline f-btn-sm" style="margin-top:10px" onclick="copyText(this.parentElement.querySelector(\'div\').innerText)">📋 복사</button>'}};

Lab.brainstorm={extractTags:function(text){if(!text.trim())return[];var words=text.replace(/[^가-힣a-zA-Z0-9\s]/g,' ').split(/\s+/).filter(function(w){return w.length>=2});var freq={};words.forEach(function(w){var lw=w.toLowerCase();freq[lw]=(freq[lw]||0)+1});var stop=['the','and','for','that','this','with','are','더','를','을','이','가','에','의','은','는','로','으로','와','과','에서','한','할','하는','하고','그','것','수','등','및'];return Object.keys(freq).filter(function(k){return freq[k]>=2&&!stop.includes(k)}).sort(function(a,b){return freq[b]-freq[a]}).slice(0,8)},
run:function(el){var text=el.querySelector('[data-dump]').value.trim(),r=el.querySelector('.f-result');r.style.display='block';if(!text){r.innerHTML='<p style="color:#94a3b8">먼저 생각을 자유롭게 적어주세요.</p>';return}

lines.forEach(function(l){var lt=l.trim();if(todoKw.some(function(k){return lt.includes(k)}))categories['할 일 ✅'].push(lt);else if(questionKw.some(function(k){return lt.includes(k)}))categories['질문 ❓'].push(lt);else if(lt.length>20)categories['아이디어 💡'].push(lt);else categories['메모 📝'].push(lt)});
var h='<h4 style="color:#a5b4fc;margin-bottom:12px">🧹 정리된 생각들</h4>';

var tags=this.extractTags(text);if(tags.length){h+='<div style="margin-top:10px">';tags.forEach(function(t){h+='<span class="tag">#'+esc(t)+'</span>'});h+='</div>'}
h+='<p style="color:#64748b;font-size:11px;margin-top:12px">'+lines.length+'줄 → '+Object.values(categories).reduce(function(s,a){return s+(a.length?1:0)},0)+'개 카테고리로 분류</p>';

Lab.textSummarizer={run:function(el){var text=el.querySelector('.f-textarea').value.trim(),r=el.querySelector('.f-result'),lenBtn=el.querySelector('.summary-len-btns button.active'),len=lenBtn?lenBtn.dataset.len:'short';r.style.display='block';if(!text){r.innerHTML='<p style="color:#94a3b8">텍스트를 입력해주세요.</p>';return}
var sents=text.split(/(?<=[.!?。\n])\s*/).filter(function(s){return s.trim().length>10});

var stop=['the','and','for','that','this','with','더','를','을','이','가','에','의','은','는','로','으로','와','과','에서','한','할','하는','하고','그','것','수','등','및'];

var h='<h4 style="color:#a5b4fc;margin-bottom:10px">📝 요약 결과</h4>';

Lab.capRate={run:function(el){var income=parseFloat(el.querySelector('[data-income]').value)||0,expense=parseFloat(el.querySelector('[data-expense]').value)||0,price=parseFloat(el.querySelector('[data-price]').value)||1,vacancy=(parseFloat(el.querySelector('[data-vacancy]').value)||0)/100,r=el.querySelector('.f-result');r.style.display='block';var egi=income*(1-vacancy),noi=egi-expense,capRate=noi/price*100,grm=price/income;var h='<h4 style="color:#a5b4fc;margin-bottom:12px">🏢 부동산 투자 분석</h4>';h+='<div class="res-row"><span style="color:#94a3b8">유효 총소득 (EGI)</span><span style="color:#e2e8f0;font-weight:600">'+egi.toLocaleString()+'만원</span></div>';h+='<div class="res-row"><span style="color:#94a3b8">순영업소득 (NOI)</span><span style="color:#10b981;font-weight:600">'+noi.toLocaleString()+'만원</span></div>';h+='<div class="res-row"><span style="color:#94a3b8">Cap Rate</span><span style="color:'+(capRate>=5?'#10b981':'#f59e0b')+';font-weight:600">'+capRate.toFixed(2)+'%</span></div>';h+='<div class="res-row"><span style="color:#94a3b8">GRM (총임대승수)</span><span style="color:#e2e8f0;font-weight:600">'+grm.toFixed(2)+'배</span></div>';h+='<div class="res-row"><span style="color:#94a3b8">운영비율 (OER)</span><span style="color:#e2e8f0;font-weight:600">'+(expense/egi*100).toFixed(1)+'%</span></div>';h+='<p style="color:#64748b;font-size:11px;margin-top:12px">💡 일반적으로 Cap Rate 5% 이상이 양호, GRM은 낮을수록 유리합니다.</p>';r.innerHTML=h}};

Lab.ltvDsr={run:function(el){var pv=parseFloat(el.querySelector('[data-pv]').value)||1,loan=parseFloat(el.querySelector('[data-loan]').value)||0,rate=(parseFloat(el.querySelector('[data-rate]').value)||0)/100,term=parseInt(el.querySelector('[data-term]').value)||30,income=parseFloat(el.querySelector('[data-income]').value)||1,existing=parseFloat(el.querySelector('[data-existing]').value)||0,r=el.querySelector('.f-result');r.style.display='block';var ltv=loan/pv*100,monthlyRate=rate/12,months=term*12,monthlyPayment=loan*monthlyRate*Math.pow(1+monthlyRate,months)/(Math.pow(1+monthlyRate,months)-1),annualPayment=monthlyPayment*12,dsr=(annualPayment+existing)/income*100,totalInterest=monthlyPayment*months-loan;var ltvColor=ltv<=60?'#10b981':ltv<=70?'#f59e0b':'#ef4444',dsrColor=dsr<=40?'#10b981':dsr<=60?'#f59e0b':'#ef4444';var h='<h4 style="color:#a5b4fc;margin-bottom:14px">🏦 대출 시뮬레이션 결과</h4>';h+='<div class="f-grid-2" style="margin-bottom:14px"><div class="f-card-sm" style="text-align:center"><div style="font-size:28px;font-weight:700;color:'+ltvColor+'">'+ltv.toFixed(1)+'%</div><div style="font-size:12px;color:#64748b;margin-top:4px">LTV (담보인정비율)</div><div class="bar" style="background:#1e1e2e"><div class="bar-fill" style="width:'+Math.min(ltv,100)+'%;background:'+ltvColor+'"><span class="bar-label" style="color:white">'+ltv.toFixed(0)+'%</span></div></div></div><div class="f-card-sm" style="text-align:center"><div style="font-size:28px;font-weight:700;color:'+dsrColor+'">'+dsr.toFixed(1)+'%</div><div style="font-size:12px;color:#64748b;margin-top:4px">DSR (총부채원리금상환비율)</div><div class="bar" style="background:#1e1e2e"><div class="bar-fill" style="width:'+Math.min(dsr,100)+'%;background:'+dsrColor+'"><span class="bar-label" style="color:white">'+dsr.toFixed(0)+'%</span></div></div></div></div>';h+='<div style="background:#1e1e2e;border-radius:8px;padding:10px 14px;margin:4px 0;display:flex;justify-content:space-between"><span style="color:#94a3b8">월 상환액</span><span style="color:#e2e8f0;font-weight:600">'+monthlyPayment.toFixed(0)+'만원</span></div>';h+='<div style="background:#1e1e2e;border-radius:8px;padding:10px 14px;margin:4px 0;display:flex;justify-content:space-between"><span style="color:#94a3b8">연 상환액</span><span style="color:#e2e8f0;font-weight:600">'+annualPayment.toFixed(0)+'만원</span></div>';h+='<div style="background:#1e1e2e;border-radius:8px;padding:10px 14px;margin:4px 0;display:flex;justify-content:space-between"><span style="color:#94a3b8">총 이자</span><span style="color:#f59e0b;font-weight:600">'+totalInterest.toFixed(0)+'만원</span></div>';h+='<p style="color:#64748b;font-size:11px;margin-top:12px">💡 LTV 60% 이하, DSR 40% 이하 권장. 원리금균등상환 기준입니다.</p>';r.innerHTML=h}};

Lab.feynman={presets:{
'블록체인':{
steps:['블록체인은 모든 거래 내역을 여러 컴퓨터가 동시에 기록하는 디지털 장부입니다. 은행 같은 중앙 관리자 없이도 모두가 같은 기록을 공유하므로 위변조가 사실상 불가능합니다.','마을 회의록을 한 명이 쓰면 조작 가능하지만, 마을 주민 100명이 각자 똑같이 적으면 한 명이 고쳐도 나머지 99명의 기록과 다르니 바로 들통납니다. 블록체인이 바로 이 원리입니다.','블록체인의 "블록"이 정확히 뭘 담고 있는지 설명할 수 있나요? 합의 알고리즘(PoW, PoS)의 차이를 아나요? 스마트 컨트랙트는 어떻게 작동하나요?','블록체인 = 모든 참여자가 동시에 기록하는 위변조 불가능한 디지털 장부. 핵심은 "탈중앙화된 신뢰"입니다.'],

analogies:['🎭 분신술: 분신을 만들어 모든 길을 동시에 시도','🎰 동전 돌리기: 떨어지기 전에는 앞면이기도 하고 뒷면이기도 함','📚 모든 책장을 동시에 훑기: 도서관에서 한 권씩이 아니라 모든 책을 동시에 확인']},
'머신러닝':{

analogies:['🏠 리모델링 사업: 헌 집을 사서 고쳐 비싸게 되파는 것','🎯 트레이너 고용: 운동 못하는 선수(기업)에게 전문 트레이너를 붙여 성적 향상','🧑‍🍳 셰프 교체: 맛없는 레스토랑을 인수해 유명 셰프를 투입하고 되파는 것']}

Lab.quizMaker={run:function(el){var text=el.querySelector('.f-textarea').value.trim(),out=el.querySelector('[data-out]');out.style.display='block';if(!text){out.innerHTML='<p style="color:#94a3b8">학습 내용을 입력해주세요.</p>';return}var sents=text.split(/(?<=[.!?。\n])\s*/).filter(function(s){return s.trim().length>10}),quizzes=[],score=0,answered=0;for(var i=0;i<Math.min(5,sents.length);i++){var s=sents[i].trim();if(s.length<10)continue;var words=s.split(/\s+/).filter(function(w){return w.length>=2}),keyIdx=Math.floor(Math.random()*Math.min(words.length,words.length)),kw=words[Math.min(keyIdx,words.length-1)];var opts=[kw];while(opts.length<4){var rw=words[Math.floor(Math.random()*words.length)];if(!opts.includes(rw)&&rw.length>=2)opts.push(rw);if(opts.length<4){var filler=['데이터','시스템','프로세스','알고리즘','네트워크','분석','결과','방법','구조','개념'];opts.push(filler[Math.floor(Math.random()*filler.length)])}}opts=opts.slice(0,4).sort(function(){return Math.random()-.5});quizzes.push({question:s.replace(kw,'_____'),answer:kw,options:opts})}if(!quizzes.length){out.innerHTML='<p style="color:#94a3b8">충분한 내용이 필요합니다 (최소 2-3문장).</p>';return}var h='<h4 style="color:#a5b4fc;margin-bottom:12px">❓ 퀴즈 ('+quizzes.length+'문제)</h4><div data-qs>';quizzes.forEach(function(q,i){h+='<div class="quiz-q" data-qi="'+i+'"><p style="color:#94a3b8;font-size:12px;margin-bottom:6px">Q'+(i+1)+'</p><p style="color:#e2e8f0;font-size:14px;margin-bottom:10px;line-height:1.7">'+esc(q.question)+'</p>';q.options.forEach(function(opt){h+='<button class="quiz-opt" data-ans="'+esc(opt)+'" data-correct="'+esc(q.answer)+'">'+esc(opt)+'</button>'});h+='</div>'});h+='</div><div data-score style="margin-top:14px;display:none"></div>';out.innerHTML=h;out.querySelectorAll('.quiz-opt').forEach(function(btn){btn.onclick=function(){var qi=this.closest('[data-qi]');if(qi.dataset.done)return;qi.dataset.done='1';var correct=this.dataset.correct;if(this.dataset.ans===correct){this.classList.add('correct');score++}else{this.classList.add('wrong');qi.querySelectorAll('.quiz-opt').forEach(function(b){if(b.dataset.ans===correct)b.classList.add('correct')})}answered++;if(answered>=quizzes.length){var scoreEl=out.querySelector('[data-score]');scoreEl.style.display='block';scoreEl.innerHTML='<div class="f-card-sm" style="text-align:center"><div style="font-size:28px;font-weight:700;color:'+(score>=quizzes.length*.8?'#10b981':score>=quizzes.length*.5?'#f59e0b':'#ef4444')+'">'+score+' / '+quizzes.length+'</div><div style="color:#94a3b8;font-size:13px;margin-top:4px">'+(score>=quizzes.length*.8?'🎉 훌륭합니다!':score>=quizzes.length*.5?'👍 좋아요!':'📖 복습이 필요합니다')+'</div></div>'}}})}};

  const grid = document.getElementById('featureGrid');
  const filtered = ALL_FEATURES.filter(f => {
    const catMatch = currentCategory === 'all' || f.cat === currentCategory;
    const q = searchQuery;
    const searchMatch = !q || f.title.toLowerCase().includes(q) || f.desc.toLowerCase().includes(q) || f.id.includes(q);
    return catMatch && searchMatch;
  });
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="no-results"><span class="nr-emoji">🔍</span><p>검색 결과가 없습니다</p></div>';
    document.getElementById('featureCount').textContent = '0개 기능';
    return;
  }
  grid.innerHTML = filtered.map(f => {
    const cat = CAT_CONFIG[f.cat] || {};
    return '<div class="feature-card" style="--card-color:' + f.color + '" onclick="openFeature(\'' + f.id + '\')" onmousemove="trackMouse(event,this)">' +
      '<span class="card-num">#' + String(f.num).padStart(2, '0') + '</span>' +
      '<span class="card-icon">' + f.icon + '</span>' +
      '<div class="card-title">' + f.title + '</div>' +
      '<div class="card-desc">' + f.desc + '</div>' +
      '<span class="card-cat" style="background:' + f.color + '15;color:' + f.color + '">' + (cat.icon || '') + ' ' + (cat.name || f.cat) + '</span>' +
    '</div>';
  }).join('');
  document.getElementById('featureCount').textContent = filtered.length + '개 기능';
}

function trackMouse(e, card) {
  const rect = card.getBoundingClientRect();
  card.style.setProperty('--mouse-x', (e.clientX - rect.left) + 'px');
  card.style.setProperty('--mouse-y', (e.clientY - rect.top) + 'px');
}

function filterCategory(cat, btn) {
  currentCategory = cat;
  document.querySelectorAll('.cat-pill').forEach(function(p) { p.classList.remove('active'); });
  btn.classList.add('active');
  renderGrid();
}

function handleSearch(query) {
  searchQuery = query.toLowerCase().trim();
  renderGrid();
}

function openFeature(id) {
  var feature = ALL_FEATURES.find(function(f) { return f.id === id; });
  if (!feature) return;
  currentFeature = feature;
  document.getElementById('modalIcon').textContent = feature.icon;
  document.getElementById('modalTitle').textContent = feature.title;
  var body = document.getElementById('modalBody');
  body.innerHTML = feature.getHTML();
  if (feature.init) {
    try { feature.init(body); } catch (e) { console.error('[Lab] init error:', e); body.innerHTML += '<p style="color:#ef4444;margin-top:12px">⚠️ 초기화 오류: ' + esc(e.message) + '</p>'; }
  }
  document.getElementById('modalOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
  setTimeout(function() { document.querySelector('.modal-close').focus(); }, 100);
}

function closeModal() {
  if (currentFeature && currentFeature.destroy) {
    try { currentFeature.destroy(document.getElementById('modalBody')); } catch (e) { console.error('[Lab] destroy error:', e); }
  }
  currentFeature = null;
  document.getElementById('modalOverlay').classList.remove('active');
  document.body.style.overflow = '';
  document.getElementById('modalBody').innerHTML = '';
}

function showToast(msg, duration) {
  duration = duration || 2000;
  var existing = document.querySelector('.toast');
  if (existing) existing.remove();
  var toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(function() { if (toast.parentNode) toast.remove(); }, duration);
}

function copyText(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() { showToast('📋 복사되었습니다!'); });
  } else {
    var ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta); showToast('📋 복사되었습니다!');
  }
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
  if (e.key === '/' && !document.activeElement.matches('input, textarea, select, [contenteditable]')) {
    e.preventDefault(); document.getElementById('searchInput').focus();
  }
  if (e.key === 'Tab' && document.getElementById('modalOverlay').classList.contains('active')) {
    var modal = document.querySelector('.modal-container');
    var focusable = modal.querySelectorAll('button, input, textarea, select, [tabindex]:not([tabindex="-1"])');
    if (focusable.length === 0) return;
    var first = focusable[0], last = focusable[focusable.length - 1];
    if (e.shiftKey) { if (document.activeElement === first) { e.preventDefault(); last.focus(); } }
    else { if (document.activeElement === last) { e.preventDefault(); first.focus(); } }
  }
});

function toggleTheme() {
  var html = document.documentElement;
  var current = html.getAttribute('data-theme');
  var next = current === 'light' ? 'dark' : 'light';
  html.setAttribute('data-theme', next);
  document.getElementById('themeToggle').textContent = next === 'light' ? '☀️' : '🌙';
  localStorage.setItem('lab-theme', next);
  var meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.content = next === 'light' ? '#f5f5f7' : '#0a0a0f';
}

function initTheme() {
  var saved = localStorage.getItem('lab-theme');
  var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  var theme = saved || (prefersDark ? 'dark' : 'light');
  if (theme === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
    document.getElementById('themeToggle').textContent = '☀️';
    var meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.content = '#f5f5f7';
  }
}

document.addEventListener('DOMContentLoaded', function() {
  ALL_FEATURES.sort(function(a, b) { return a.num - b.num; });
  renderGrid();
  initTheme();
});
</script>
</body>
</html>

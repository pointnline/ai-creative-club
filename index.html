<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧪 AI Creative Lab</title>
<style>
/* ========================================
   AI Creative Lab — Design System
   ======================================== */

/* Reset */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { height: 100%; -webkit-font-smoothing: antialiased; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: #0a0a0f;
  color: #e2e8f0;
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.5;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #555; }

/* ===== HEADER ===== */
.lab-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 64px;
  background: rgba(10, 10, 15, 0.92);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  z-index: 100;
}

.logo {
  font-size: 22px;
  font-weight: 800;
  background: linear-gradient(135deg, #6366f1 0%, #ec4899 50%, #f59e0b 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.5px;
}

.logo-sub {
  font-size: 11px;
  color: #64748b;
  margin-left: 10px;
  font-weight: 500;
  background: rgba(99,102,241,0.1);
  padding: 3px 10px;
  border-radius: 20px;
  border: 1px solid rgba(99,102,241,0.2);
}

.header-left { display: flex; align-items: center; }

.search-box {
  position: relative;
  width: 280px;
}

.search-box input {
  width: 100%;
  background: rgba(18, 18, 26, 0.8);
  border: 1px solid #252540;
  border-radius: 12px;
  padding: 10px 16px 10px 38px;
  color: #e2e8f0;
  font-size: 13px;
  outline: none;
  transition: all 0.3s;
  font-family: inherit;
}

.search-box input:focus {
  border-color: #6366f1;
  box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
}

.search-box input::placeholder { color: #4a4a6a; }

.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: #4a4a6a;
  font-size: 14px;
  pointer-events: none;
}

.header-right {
  display: flex; align-items: center; gap: 16px;
}

.feature-count {
  font-size: 12px;
  color: #64748b;
  font-weight: 500;
}

.kbd-hint {
  font-size: 11px;
  color: #4a4a6a;
  background: #1a1a2e;
  padding: 2px 8px;
  border-radius: 4px;
  border: 1px solid #252540;
  font-family: monospace;
}

/* ===== CATEGORY NAV ===== */
.category-nav {
  position: fixed;
  top: 64px; left: 0; right: 0;
  background: rgba(10, 10, 15, 0.88);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  padding: 12px 32px;
  display: flex;
  gap: 8px;
  z-index: 99;
  overflow-x: auto;
}

.category-nav::-webkit-scrollbar { height: 0; }

.cat-pill {
  padding: 8px 18px;
  border-radius: 24px;
  border: 1px solid #252540;
  background: transparent;
  color: #94a3b8;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.25s ease;
  font-family: inherit;
}

.cat-pill:hover {
  border-color: rgba(99,102,241,0.4);
  color: #e2e8f0;
  background: rgba(99,102,241,0.08);
}

.cat-pill.active {
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  border-color: transparent;
  color: white;
  box-shadow: 0 2px 12px rgba(99,102,241,0.3);
}

/* ===== MAIN CONTENT ===== */
.main-content {
  margin-top: 128px;
  padding: 24px 32px 80px;
  max-width: 1440px;
  margin-left: auto;
  margin-right: auto;
}

/* ===== FEATURE GRID ===== */
.feature-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  gap: 16px;
}

/* ===== FEATURE CARD ===== */
.feature-card {
  background: #12121a;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 16px;
  padding: 24px;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
}

.feature-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--card-color);
  opacity: 0;
  transition: opacity 0.3s;
}

.feature-card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(600px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(99,102,241,0.06), transparent 40%);
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}

.feature-card:hover {
  border-color: rgba(255,255,255,0.1);
  transform: translateY(-4px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.4);
}

.feature-card:hover::before { opacity: 1; }
.feature-card:hover::after { opacity: 1; }

.card-icon {
  font-size: 36px;
  margin-bottom: 14px;
  display: block;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
}

.card-num {
  position: absolute;
  top: 14px; right: 18px;
  font-size: 11px;
  color: #4a4a6a;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}

.card-title {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 8px;
  color: #e2e8f0;
  letter-spacing: -0.2px;
}

.card-desc {
  font-size: 13px;
  color: #7a7a9a;
  line-height: 1.6;
}

.card-cat {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  margin-top: 14px;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 500;
}

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.75);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.modal-overlay.active { display: flex; }

.modal-container {
  background: #12121a;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px;
  width: 100%;
  max-width: 860px;
  max-height: 88vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  animation: modalIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow: 0 24px 80px rgba(0,0,0,0.5);
}

@keyframes modalIn {
  from { opacity: 0; transform: scale(0.96) translateY(16px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 24px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0;
}

.modal-title {
  display: flex;
  align-items: center;
  gap: 12px;
}

.modal-icon { font-size: 26px; }

.modal-title h2 {
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.3px;
}

.modal-close {
  width: 36px; height: 36px;
  border-radius: 10px;
  border: 1px solid #252540;
  background: transparent;
  color: #94a3b8;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.modal-close:hover {
  background: #252540;
  color: #e2e8f0;
  border-color: #333;
}

.modal-body {
  padding: 24px;
  overflow-y: auto;
  flex: 1;
}

/* ===== UTILITY CSS CLASSES (shared with features) ===== */
.f-textarea {
  width: 100%;
  min-height: 120px;
  background: #1a1a2e;
  border: 1px solid #2a2a40;
  border-radius: 10px;
  color: #e2e8f0;
  padding: 14px;
  font-size: 14px;
  font-family: inherit;
  resize: vertical;
  outline: none;
  transition: border-color 0.3s;
  line-height: 1.6;
}

.f-textarea:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
.f-textarea::placeholder { color: #4a4a6a; }

.f-input {
  width: 100%;
  background: #1a1a2e;
  border: 1px solid #2a2a40;
  border-radius: 10px;
  color: #e2e8f0;
  padding: 11px 14px;
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.3s;
}

.f-input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
.f-input::placeholder { color: #4a4a6a; }

.f-select {
  background: #1a1a2e;
  border: 1px solid #2a2a40;
  border-radius: 10px;
  color: #e2e8f0;
  padding: 11px 14px;
  font-size: 14px;
  outline: none;
  cursor: pointer;
  font-family: inherit;
  transition: border-color 0.3s;
}

.f-select:focus { border-color: #6366f1; }

.f-btn {
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  border: none;
  border-radius: 10px;
  color: white;
  padding: 11px 22px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.25s ease;
  font-family: inherit;
  letter-spacing: -0.1px;
}

.f-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(99, 102, 241, 0.4);
}

.f-btn:active { transform: translateY(0); }

.f-btn-outline {
  background: transparent;
  border: 1px solid rgba(99,102,241,0.4);
  color: #a5b4fc;
  border-radius: 10px;
  padding: 11px 22px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.25s ease;
  font-family: inherit;
}

.f-btn-outline:hover {
  background: rgba(99, 102, 241, 0.1);
  border-color: #6366f1;
}

.f-btn-sm {
  padding: 6px 14px;
  font-size: 12px;
  border-radius: 8px;
}

.f-result {
  background: rgba(26, 26, 46, 0.6);
  border-radius: 12px;
  padding: 18px;
  margin-top: 14px;
  min-height: 60px;
  border: 1px solid #252540;
  line-height: 1.7;
  font-size: 14px;
}

.f-label {
  font-size: 13px;
  color: #7a7a9a;
  margin-bottom: 6px;
  display: block;
  font-weight: 500;
}

.f-badge {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  background: rgba(99, 102, 241, 0.15);
  color: #a5b4fc;
}

.f-divider {
  border: none;
  border-top: 1px solid #252540;
  margin: 18px 0;
}

.f-slider {
  width: 100%;
  accent-color: #6366f1;
  cursor: pointer;
  height: 6px;
}

.f-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.f-tab {
  padding: 8px 16px;
  border-radius: 10px;
  background: #1a1a2e;
  color: #7a7a9a;
  border: 1px solid transparent;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  transition: all 0.2s;
  font-family: inherit;
}

.f-tab:hover { color: #e2e8f0; background: #222238; }

.f-tab.active {
  background: rgba(99,102,241,0.15);
  color: #a5b4fc;
  border-color: rgba(99,102,241,0.3);
}

.f-row {
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
}

.f-col {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.f-grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.f-grid-3 {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
}

.f-card-sm {
  background: #1a1a2e;
  border-radius: 10px;
  padding: 14px;
  border: 1px solid #252540;
  transition: border-color 0.2s;
}

.f-card-sm:hover { border-color: #333; }

.f-full { width: 100%; }

/* ===== EMPTY / NO RESULTS ===== */
.no-results {
  text-align: center;
  padding: 80px 24px;
  color: #4a4a6a;
  grid-column: 1 / -1;
}

.no-results .nr-emoji {
  font-size: 56px;
  margin-bottom: 16px;
  display: block;
  filter: grayscale(0.5);
}

.no-results p {
  font-size: 15px;
  font-weight: 500;
}

/* ===== TOAST ===== */
.toast {
  position: fixed;
  bottom: 28px;
  right: 28px;
  background: #1a1a2e;
  border: 1px solid rgba(99,102,241,0.3);
  border-radius: 12px;
  padding: 12px 20px;
  color: #e2e8f0;
  font-size: 13px;
  font-weight: 500;
  z-index: 300;
  animation: toastIn 0.3s ease;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}

@keyframes toastIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .lab-header { padding: 0 16px; height: 56px; }
  .search-box { width: 160px; }
  .logo { font-size: 18px; }
  .logo-sub { display: none; }
  .kbd-hint { display: none; }
  .category-nav { padding: 10px 16px; top: 56px; }
  .main-content { padding: 16px 16px 60px; margin-top: 110px; }
  .feature-grid { grid-template-columns: 1fr; gap: 12px; }
  .feature-card { padding: 20px; }
  .modal-container { max-width: 100%; max-height: 92vh; border-radius: 16px 16px 0 0; }
  .modal-overlay { padding: 0; align-items: flex-end; }
  .f-grid-2, .f-grid-3 { grid-template-columns: 1fr; }
}

@media (max-width: 480px) {
  .search-box { width: 140px; }
  .cat-pill { padding: 6px 14px; font-size: 12px; }
}
</style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="lab-header">
  <div class="header-left">
    <span class="logo">🧪 AI Creative Lab</span>
    <span class="logo-sub">43 Tools</span>
  </div>
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="기능 검색..." oninput="handleSearch(this.value)">
  </div>
  <div class="header-right">
    <span class="feature-count" id="featureCount">43개 기능</span>
    <span class="kbd-hint">/</span>
  </div>
</header>

<!-- ===== CATEGORY NAV ===== -->
<nav class="category-nav" id="categoryNav">
  <button class="cat-pill active" data-cat="all" onclick="filterCategory('all', this)">🧪 전체 (43)</button>
  <button class="cat-pill" data-cat="productivity" onclick="filterCategory('productivity', this)">🧠 생산성 (7)</button>
  <button class="cat-pill" data-cat="creative" onclick="filterCategory('creative', this)">🎨 크리에이티브 (8)</button>
  <button class="cat-pill" data-cat="finance" onclick="filterCategory('finance', this)">📊 금융/투자 (7)</button>
  <button class="cat-pill" data-cat="learning" onclick="filterCategory('learning', this)">📚 학습/리서치 (7)</button>
  <button class="cat-pill" data-cat="lifestyle" onclick="filterCategory('lifestyle', this)">🏠 라이프스타일 (7)</button>
  <button class="cat-pill" data-cat="utility" onclick="filterCategory('utility', this)">🔧 유틸리티 (7)</button>
</nav>

<!-- ===== MAIN ===== -->
<main class="main-content">
  <div class="feature-grid" id="featureGrid"></div>
</main>

<!-- ===== MODAL ===== -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-container">
    <div class="modal-header">
      <div class="modal-title">
        <span class="modal-icon" id="modalIcon"></span>
        <h2 id="modalTitle"></h2>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
// ========================================
// AI Creative Lab — Core Engine
// ========================================

window.ALL_FEATURES = [];
window.Lab = {};

// --- State ---
let currentCategory = 'all';
let searchQuery = '';
let currentFeature = null;

// --- Category Config ---
const CAT_CONFIG = {
  productivity: { name: '생산성', color: '#6366f1', icon: '🧠' },
  creative:     { name: '크리에이티브', color: '#ec4899', icon: '🎨' },
  finance:      { name: '금융/투자', color: '#10b981', icon: '📊' },
  learning:     { name: '학습/리서치', color: '#f59e0b', icon: '📚' },
  lifestyle:    { name: '라이프스타일', color: '#06b6d4', icon: '🏠' },
  utility:      { name: '유틸리티', color: '#8b5cf6', icon: '🔧' }
};

// ========================================
// BATCH 1: Productivity + Creative #1-15
// ========================================

(function(){
var css=`

.f-text-diff .dl{padding:2px 6px;font-family:monospace;font-size:12px;border-radius:3px;margin:1px 0}
.f-text-diff .da{background:rgba(34,197,94,.12);color:#4ade80}
.f-text-diff .dd{background:rgba(239,68,68,.12);color:#f87171}

.f-gen-art .ctrls label{font-size:12px;color:#94a3b8}

.f-css-art pre{background:#1e1e2e;padding:10px;border-radius:8px;font-size:11px;overflow-x:auto;margin-top:10px;white-space:pre-wrap;color:#a5b4fc}
.f-infographic svg{width:100%;max-height:300px}
.f-ascii-art pre{background:#1e1e2e;padding:14px;border-radius:10px;font-size:8px;line-height:1.1;overflow-x:auto;color:#a5b4fc}
.f-moodboard .board{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.f-moodboard .ps{display:flex;height:50px;border-radius:8px;overflow:hidden}
.f-moodboard .pt{width:100%;height:70px;border-radius:8px}
`;
var s=document.createElement('style');s.textContent=css;document.head.appendChild(s);

Lab.meetingSummary={run:function(el){var text=el.querySelector('.f-textarea').value.trim(),r=el.querySelector('.f-result');r.style.display='block';if(!text){r.innerHTML='<p style="color:#94a3b8">회의 내용을 입력해주세요.</p>';return}var sents=text.split(/(?<=[.!?。\n])\s*/).filter(function(s){return s.trim().length>5}),kw=['핵심','중요','결론','결과','따라서','주요','목표','전략','합의','결정','계획'],scored=sents.map(function(s){var sc=Math.min(s.length,80)*.1;kw.forEach(function(k){if(s.includes(k))sc+=10});return{t:s.trim(),s:sc}}).sort(function(a,b){return b.s-a.s}),sum=scored.slice(0,Math.min(5,scored.length)),akw=['해야','할 것','확인','검토','준비','제출','완료','TODO','다음주','내일','까지'],acts=sents.filter(function(s){return akw.some(function(k){return s.includes(k)})});var h='<h4 style="color:#a5b4fc;margin-bottom:10px">📋 핵심 요약</h4>';sum.forEach(function(s){h+='<p style="margin:5px 0;color:#e2e8f0;font-size:14px">• '+s.t+'</p>'});if(acts.length){h+='<hr class="f-divider"><h4 style="color:#f59e0b;margin-bottom:10px">✅ 액션 아이템 ('+acts.length+'개)</h4>';acts.forEach(function(a){h+='<div class="act-item">'+a.trim()+'</div>'})}h+='<p style="color:#64748b;font-size:11px;margin-top:12px">'+sents.length+'문장 분석 → 요약 '+sum.length+'개, 액션 '+acts.length+'개</p>';r.innerHTML=h}};

Lab.genArt={af:0,mode:'particle',particles:[],t:0,stop:function(){cancelAnimationFrame(this.af)},reset:function(el){this.particles=[];this.t=0;var c=el.querySelector('canvas'),ctx=c.getContext('2d');ctx.clearRect(0,0,c.width,c.height);this.particles=[];var dn=parseInt(el.querySelector('[data-dn]').value)*20;for(var i=0;i<dn;i++)this.particles.push({x:Math.random()*c.width,y:Math.random()*c.height,vx:0,vy:0,life:Math.random()*100})},start:function(el){var self=this,c=el.querySelector('canvas'),ctx=c.getContext('2d');this.reset(el);function draw(){self.af=requestAnimationFrame(draw);var sp=parseInt((el.querySelector('[data-sp]')||{}).value||5)*.3,hu=parseInt((el.querySelector('[data-hu]')||{}).value||320);ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,c.width,c.height);self.t+=.01*sp;if(self.mode==='particle'){self.particles.forEach(function(p){var angle=Math.sin(p.x*.01+self.t)*Math.cos(p.y*.01+self.t)*Math.PI*2;p.vx=Math.cos(angle)*sp;p.vy=Math.sin(angle)*sp;p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>c.width)p.x=Math.random()*c.width;if(p.y<0||p.y>c.height)p.y=Math.random()*c.height;ctx.fillStyle='hsl('+hu+',80%,60%)';ctx.fillRect(p.x,p.y,2,2)})}else if(self.mode==='fractal'){ctx.fillStyle='rgba(0,0,0,1)';ctx.fillRect(0,0,c.width,c.height);function branch(x,y,len,angle,depth){if(depth<=0||len<2)return;var ex=x+Math.cos(angle)*len,ey=y-Math.sin(angle)*len;ctx.strokeStyle='hsl('+(hu+depth*15)+',70%,'+(40+depth*5)+'%)';ctx.lineWidth=depth*.8;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(ex,ey);ctx.stroke();var wind=Math.sin(self.t*2)*.1;branch(ex,ey,len*.7,angle+.5+wind,depth-1);branch(ex,ey,len*.7,angle-.5+wind,depth-1)}branch(c.width/2,c.height,80,.5*Math.PI,10)}else if(self.mode==='wave'){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,c.width,c.height);for(var x=0;x<c.width;x+=3){for(var j=0;j<3;j++){var y=c.height/2+Math.sin(x*.02+self.t+j*2)*50*Math.cos(x*.01+self.t*.5+j)*Math.sin(self.t+j);ctx.fillStyle='hsla('+(hu+j*40)+',80%,60%,0.5)';ctx.fillRect(x,y+j*20,2,2)}}}else if(self.mode==='spiral'){self.particles.forEach(function(p,i){var a=self.t+i*.1,r=50+i*.5+Math.sin(self.t+i*.05)*30;p.x=c.width/2+Math.cos(a)*r;p.y=c.height/2+Math.sin(a)*r;ctx.shadowBlur=10;ctx.shadowColor='hsl('+((hu+i*2)%360)+',80%,60%)';ctx.fillStyle='hsl('+((hu+i*2)%360)+',80%,60%)';ctx.fillRect(p.x,p.y,3,3);ctx.shadowBlur=0})}}draw()}};

Lab.dcfCalc={run:function(el){var fcf=parseFloat(el.querySelector('[data-fcf]').value)||0,gr=(parseFloat(el.querySelector('[data-gr]').value)||0)/100,wacc=(parseFloat(el.querySelector('[data-wacc]').value)||10)/100,yr=parseInt(el.querySelector('[data-yr]').value)||10,tg=(parseFloat(el.querySelector('[data-tg]').value)||2)/100,r=el.querySelector('.f-result');r.style.display='block';if(!fcf){r.innerHTML='<p style="color:#94a3b8">FCF를 입력해주세요.</p>';return}var pvSum=0,cashflows=[];for(var i=1;i<=yr;i++){var cf=fcf*Math.pow(1+gr,i),pv=cf/Math.pow(1+wacc,i);pvSum+=pv;cashflows.push({yr:i,cf:cf.toFixed(1),pv:pv.toFixed(1)})}var terminalCF=fcf*Math.pow(1+gr,yr)*(1+tg),tv=terminalCF/(wacc-tg),pvTV=tv/Math.pow(1+wacc,yr),ev=pvSum+pvTV;var h='<div class="res-grid"><div class="res-card"><div class="res-val">'+ev.toFixed(0)+'억</div><div class="res-label">기업가치 (EV)</div></div><div class="res-card"><div class="res-val">'+pvSum.toFixed(0)+'억</div><div class="res-label">추정기간 PV</div></div><div class="res-card"><div class="res-val">'+pvTV.toFixed(0)+'억</div><div class="res-label">잔존가치 PV</div></div><div class="res-card"><div class="res-val">'+(pvTV/ev*100).toFixed(1)+'%</div><div class="res-label">잔존가치 비중</div></div></div>';h+='<div style="margin-top:14px"><h4 style="color:#a5b4fc;font-size:13px;margin-bottom:8px">연도별 현금흐름</h4><div style="max-height:200px;overflow-y:auto">';cashflows.forEach(function(c){h+='<div style="display:flex;justify-content:space-between;padding:4px 10px;font-size:12px;color:#94a3b8"><span>'+c.yr+'년차</span><span>FCF: '+c.cf+'억</span><span>PV: '+c.pv+'억</span></div>'});h+='</div></div>';r.innerHTML=h}};

Lab.capRate={run:function(el){var income=parseFloat(el.querySelector('[data-income]').value)||0,expense=parseFloat(el.querySelector('[data-expense]').value)||0,price=parseFloat(el.querySelector('[data-price]').value)||1,vacancy=(parseFloat(el.querySelector('[data-vacancy]').value)||0)/100,r=el.querySelector('.f-result');r.style.display='block';var egi=income*(1-vacancy),noi=egi-expense,capRate=noi/price*100,grm=price/income,cashOnCash=noi/price*100;var h='<h4 style="color:#a5b4fc;margin-bottom:12px">🏢 부동산 투자 분석</h4>';h+='<div class="res-row"><span style="color:#94a3b8">유효 총소득 (EGI)</span><span style="color:#e2e8f0;font-weight:600">'+egi.toLocaleString()+'만원</span></div>';h+='<div class="res-row"><span style="color:#94a3b8">순영업소득 (NOI)</span><span style="color:#10b981;font-weight:600">'+noi.toLocaleString()+'만원</span></div>';h+='<div class="res-row"><span style="color:#94a3b8">Cap Rate</span><span style="color:'+(capRate>=5?'#10b981':'#f59e0b')+';font-weight:600">'+capRate.toFixed(2)+'%</span></div>';h+='<div class="res-row"><span style="color:#94a3b8">GRM (총임대승수)</span><span style="color:#e2e8f0;font-weight:600">'+grm.toFixed(2)+'배</span></div>';h+='<div class="res-row"><span style="color:#94a3b8">운영비율 (OER)</span><span style="color:#e2e8f0;font-weight:600">'+(expense/egi*100).toFixed(1)+'%</span></div>';h+='<p style="color:#64748b;font-size:11px;margin-top:12px">💡 일반적으로 Cap Rate 5% 이상이 양호, GRM은 낮을수록 유리합니다.</p>';r.innerHTML=h}};

Lab.ltvDsr={run:function(el){var pv=parseFloat(el.querySelector('[data-pv]').value)||1,loan=parseFloat(el.querySelector('[data-loan]').value)||0,rate=(parseFloat(el.querySelector('[data-rate]').value)||0)/100,term=parseInt(el.querySelector('[data-term]').value)||30,income=parseFloat(el.querySelector('[data-income]').value)||1,existing=parseFloat(el.querySelector('[data-existing]').value)||0,r=el.querySelector('.f-result');r.style.display='block';var ltv=loan/pv*100,monthlyRate=rate/12,months=term*12,monthlyPayment=loan*monthlyRate*Math.pow(1+monthlyRate,months)/(Math.pow(1+monthlyRate,months)-1),annualPayment=monthlyPayment*12,dsr=(annualPayment+existing)/income*100,totalInterest=monthlyPayment*months-loan;var ltvColor=ltv<=60?'#10b981':ltv<=70?'#f59e0b':'#ef4444',dsrColor=dsr<=40?'#10b981':dsr<=60?'#f59e0b':'#ef4444';var h='<h4 style="color:#a5b4fc;margin-bottom:14px">🏦 대출 시뮬레이션 결과</h4>';h+='<div class="f-grid-2" style="margin-bottom:14px"><div class="f-card-sm" style="text-align:center"><div style="font-size:28px;font-weight:700;color:'+ltvColor+'">'+ltv.toFixed(1)+'%</div><div style="font-size:12px;color:#64748b;margin-top:4px">LTV (담보인정비율)</div><div class="bar" style="background:#1e1e2e"><div class="bar-fill" style="width:'+Math.min(ltv,100)+'%;background:'+ltvColor+'"><span class="bar-label" style="color:white">'+ltv.toFixed(0)+'%</span></div></div></div><div class="f-card-sm" style="text-align:center"><div style="font-size:28px;font-weight:700;color:'+dsrColor+'">'+dsr.toFixed(1)+'%</div><div style="font-size:12px;color:#64748b;margin-top:4px">DSR (총부채원리금상환비율)</div><div class="bar" style="background:#1e1e2e"><div class="bar-fill" style="width:'+Math.min(dsr,100)+'%;background:'+dsrColor+'"><span class="bar-label" style="color:white">'+dsr.toFixed(0)+'%</span></div></div></div></div>';h+='<div class="res-row" style="background:#1e1e2e;border-radius:8px;padding:10px 14px;margin:4px 0"><span style="color:#94a3b8">월 상환액</span><span style="color:#e2e8f0;font-weight:600">'+monthlyPayment.toFixed(0)+'만원</span></div>';h+='<div class="res-row" style="background:#1e1e2e;border-radius:8px;padding:10px 14px;margin:4px 0"><span style="color:#94a3b8">연 상환액</span><span style="color:#e2e8f0;font-weight:600">'+annualPayment.toFixed(0)+'만원</span></div>';h+='<div class="res-row" style="background:#1e1e2e;border-radius:8px;padding:10px 14px;margin:4px 0"><span style="color:#94a3b8">총 이자</span><span style="color:#f59e0b;font-weight:600">'+totalInterest.toFixed(0)+'만원</span></div>';h+='<p style="color:#64748b;font-size:11px;margin-top:12px">💡 LTV 60% 이하, DSR 40% 이하 권장. 원리금균등상환 기준입니다.</p>';r.innerHTML=h}};

Lab.financialRatios={run:function(el){var rev=parseFloat(el.querySelector('[data-rev]').value)||1,op=parseFloat(el.querySelector('[data-op]').value)||0,ni=parseFloat(el.querySelector('[data-ni]').value)||0,ta=parseFloat(el.querySelector('[data-ta]').value)||1,td=parseFloat(el.querySelector('[data-td]').value)||0,eq=parseFloat(el.querySelector('[data-eq]').value)||1,r=el.querySelector('.f-result');r.style.display='block';var ratios=[{name:'영업이익률',val:(op/rev*100).toFixed(1)+'%',color:op/rev>.1?'#10b981':'#f59e0b'},{name:'순이익률',val:(ni/rev*100).toFixed(1)+'%',color:ni/rev>.05?'#10b981':'#f59e0b'},{name:'ROE',val:(ni/eq*100).toFixed(1)+'%',color:ni/eq>.1?'#10b981':'#f59e0b'},{name:'ROA',val:(ni/ta*100).toFixed(1)+'%',color:ni/ta>.05?'#10b981':'#f59e0b'},{name:'부채비율',val:(td/eq*100).toFixed(0)+'%',color:td/eq<2?'#10b981':'#ef4444'},{name:'자기자본비율',val:(eq/ta*100).toFixed(1)+'%',color:eq/ta>.4?'#10b981':'#f59e0b'}];var h='<h4 style="color:#a5b4fc;margin-bottom:12px">📊 재무비율 분석</h4><div class="ratio-grid">';ratios.forEach(function(rt){h+='<div class="ratio-card"><div class="ratio-val" style="color:'+rt.color+'">'+rt.val+'</div><div class="ratio-name">'+rt.name+'</div></div>'});h+='</div><hr class="f-divider"><div style="font-size:13px;color:#94a3b8"><p><strong style="color:#e2e8f0">수익성:</strong> 영업이익률 '+(op/rev*100).toFixed(1)+'%, 순이익률 '+(ni/rev*100).toFixed(1)+'%</p><p style="margin-top:4px"><strong style="color:#e2e8f0">효율성:</strong> ROE '+(ni/eq*100).toFixed(1)+'%, ROA '+(ni/ta*100).toFixed(1)+'%</p><p style="margin-top:4px"><strong style="color:#e2e8f0">안정성:</strong> 부채비율 '+(td/eq*100).toFixed(0)+'%, 자기자본비율 '+(eq/ta*100).toFixed(1)+'%</p></div>';r.innerHTML=h}};

Lab.feynman={run:function(el){var concept=el.querySelector('[data-concept]').value.trim(),r=el.querySelector('.f-result');r.style.display='block';if(!concept){r.innerHTML='<p style="color:#94a3b8">개념을 입력해주세요.</p>';return}var h='<h4 style="color:#a5b4fc;margin-bottom:12px">🧑‍🏫 파인만 기법: '+concept+'</h4>';h+='<div class="step"><div class="step-num">Step 1. 개념 정의</div><p style="color:#e2e8f0;font-size:14px">'+concept+'이란, 간단히 말해서 특정 목적을 달성하기 위한 체계적인 방법/구조/원리입니다. 일상에서 비유하자면, '+concept+'은 레시피와 같습니다 — 정해진 재료(입력)를 정해진 순서(과정)로 처리하여 원하는 결과(출력)를 만들어냅니다.</p></div>';h+='<div class="step"><div class="step-num">Step 2. 쉽게 설명하기</div><p style="color:#e2e8f0;font-size:14px">12살 아이에게 설명한다면: "'+concept+'은 마치 레고 블록처럼, 작은 조각들을 규칙에 따라 조립하는 것이야. 각 조각은 단순하지만, 합치면 복잡하고 멋진 것을 만들 수 있어."</p></div>';h+='<div class="step"><div class="step-num">Step 3. 부족한 부분 확인</div><p style="color:#e2e8f0;font-size:14px">스스로에게 질문해보세요:<br>• '+concept+'의 핵심 원리를 한 문장으로 설명할 수 있나요?<br>• '+concept+'이 없다면 어떤 문제가 생길까요?<br>• '+concept+'의 한계점은 무엇인가요?<br>• 실제 예시 3가지를 들 수 있나요?</p></div>';h+='<div class="step"><div class="step-num">Step 4. 단순화 & 비유</div><p style="color:#e2e8f0;font-size:14px">최종 정리: '+concept+'은 [입력]을 [과정]을 통해 [출력]으로 변환하는 시스템입니다. 핵심은 이 과정에서 일어나는 [핵심 메커니즘]에 있습니다. 비유하면 커피머신(입력:원두/물 → 과정:추출 → 출력:커피)과 같습니다.</p></div>';h+='<p style="color:#64748b;font-size:11px;margin-top:12px">💡 각 Step의 [ ] 부분을 '+concept+' 관련 구체적 내용으로 채워보세요!</p>';r.innerHTML=h}};

// --- Render Feature Grid ---
function renderGrid() {
  const grid = document.getElementById('featureGrid');
  const filtered = ALL_FEATURES.filter(f => {
    const catMatch = currentCategory === 'all' || f.cat === currentCategory;
    const q = searchQuery;
    const searchMatch = !q ||
      f.title.toLowerCase().includes(q) ||
      f.desc.toLowerCase().includes(q) ||
      f.id.includes(q);
    return catMatch && searchMatch;
  });

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="no-results"><span class="nr-emoji">🔍</span><p>검색 결과가 없습니다</p></div>';
    document.getElementById('featureCount').textContent = '0개 기능';
    return;
  }

  grid.innerHTML = filtered.map(f => {
    const cat = CAT_CONFIG[f.cat] || {};
    return '<div class="feature-card" style="--card-color:' + f.color + '" onclick="openFeature(\'' + f.id + '\')" onmousemove="trackMouse(event,this)">' +
      '<span class="card-num">#' + String(f.num).padStart(2, '0') + '</span>' +
      '<span class="card-icon">' + f.icon + '</span>' +
      '<div class="card-title">' + f.title + '</div>' +
      '<div class="card-desc">' + f.desc + '</div>' +
      '<span class="card-cat" style="background:' + f.color + '15;color:' + f.color + '">' + (cat.icon || '') + ' ' + (cat.name || f.cat) + '</span>' +
    '</div>';
  }).join('');

  document.getElementById('featureCount').textContent = filtered.length + '개 기능';
}

// --- Card Mouse Tracking (glow effect) ---
function trackMouse(e, card) {
  const rect = card.getBoundingClientRect();
  card.style.setProperty('--mouse-x', (e.clientX - rect.left) + 'px');
  card.style.setProperty('--mouse-y', (e.clientY - rect.top) + 'px');
}

// --- Category Filter ---
function filterCategory(cat, btn) {
  currentCategory = cat;
  document.querySelectorAll('.cat-pill').forEach(function(p) { p.classList.remove('active'); });
  btn.classList.add('active');
  renderGrid();
}

// --- Search ---
function handleSearch(query) {
  searchQuery = query.toLowerCase().trim();
  renderGrid();
}

// --- Modal: Open Feature ---
function openFeature(id) {
  var feature = ALL_FEATURES.find(function(f) { return f.id === id; });
  if (!feature) return;
  currentFeature = feature;

  document.getElementById('modalIcon').textContent = feature.icon;
  document.getElementById('modalTitle').textContent = feature.title;

  var body = document.getElementById('modalBody');
  body.innerHTML = feature.getHTML();

  if (feature.init) {
    try { feature.init(body); } catch (e) { /* silent */ }
  }

  document.getElementById('modalOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

// --- Modal: Close ---
function closeModal() {
  if (currentFeature && currentFeature.destroy) {
    try { currentFeature.destroy(document.getElementById('modalBody')); } catch (e) { /* silent */ }
  }
  currentFeature = null;
  document.getElementById('modalOverlay').classList.remove('active');
  document.body.style.overflow = '';
  document.getElementById('modalBody').innerHTML = '';
}

// --- Toast Notification ---
function showToast(msg, duration) {
  duration = duration || 2000;
  var existing = document.querySelector('.toast');
  if (existing) existing.remove();
  var toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(function() { if (toast.parentNode) toast.remove(); }, duration);
}

// --- Copy to Clipboard ---
function copyText(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() { showToast('📋 복사되었습니다!'); });
  } else {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('📋 복사되었습니다!');
  }
}

// --- Keyboard Shortcuts ---
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
  if (e.key === '/' && !document.activeElement.matches('input, textarea, select, [contenteditable]')) {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
});

// --- Init ---
document.addEventListener('DOMContentLoaded', function() {
  ALL_FEATURES.sort(function(a, b) { return a.num - b.num; });
  renderGrid();
});
</script>
